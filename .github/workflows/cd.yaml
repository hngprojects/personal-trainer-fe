name: Deploy Frontend

on:
  push:
    branches:
      - staging
      - main

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-staging:
    if: github.ref == 'refs/heads/staging'
    name: Deploy Frontend Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout frontend repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Create environment file
        run: |
          echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" >> .env.production
          echo "NEXT_PUBLIC_APP_ENV=${{ secrets.NEXT_PUBLIC_APP_ENV }}" >> .env.production
          echo "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" >> .env.production
          echo "PORT=3001" >> .env.production

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Prepare deployment artifact
        run: |
          mkdir -p deploy
          cp -r .next deploy/.next
          cp -r public deploy/public
          cp package.json deploy/package.json
          cp pnpm-lock.yaml deploy/pnpm-lock.yaml
          cp next.config.* deploy/ 2>/dev/null || true
          cp .env.production deploy/.env.production

      - name: Deploy frontend staging
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          REMOTE_PORT: ${{ secrets.SERVER_PORT }}
          SOURCE: deploy/
          TARGET: /var/www/personal-trainer/frontend/staging/
          ARGS: -rlgoDzvc --delete

      - name: Install dependencies and restart staging frontend
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          request_pty: false
          script: |
            echo "=== whoami ==="
            whoami
            echo "=== pwd before cd ==="
            pwd
            echo "=== sudo BEFORE cd and pnpm ==="
            sudo -n /usr/bin/systemctl restart personal-trainer-frontend-staging 2>&1
            echo "exit_before_anything: $?"

            echo "=== cd to deploy dir ==="
            cd /var/www/personal-trainer/frontend/staging
            pwd
            echo "=== sudo AFTER cd, BEFORE pnpm ==="
            sudo -n /usr/bin/systemctl restart personal-trainer-frontend-staging 2>&1
            echo "exit_after_cd: $?"

            echo "=== running pnpm install ==="
            pnpm install --prod --frozen-lockfile
            echo "=== sudo AFTER pnpm ==="
            sudo -n /usr/bin/systemctl restart personal-trainer-frontend-staging 2>&1
            echo "exit_after_pnpm: $?"

            echo "=== sudo -ln (what sudo thinks I can do) ==="
            sudo -ln 2>&1

            echo "=== env ==="
            env | sort

            echo "=== DONE ==="

  deploy-production:
    if: github.ref == 'refs/heads/main'
    name: Deploy Frontend Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout frontend repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Create environment file
        run: |
          echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" >> .env.production
          echo "NEXT_PUBLIC_APP_ENV=${{ secrets.NEXT_PUBLIC_APP_ENV }}" >> .env.production
          echo "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" >> .env.production
          echo "PORT=3002" >> .env.production

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Prepare deployment artifact
        run: |
          mkdir -p deploy
          cp -r .next deploy/.next
          cp -r public deploy/public
          cp package.json deploy/package.json
          cp pnpm-lock.yaml deploy/pnpm-lock.yaml
          cp next.config.* deploy/ 2>/dev/null || true
          cp .env.production deploy/.env.production

      - name: Deploy frontend production
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          REMOTE_PORT: ${{ secrets.SERVER_PORT }}
          SOURCE: deploy/
          TARGET: /var/www/personal-trainer/frontend/production/
          ARGS: -rlgoDzvc --delete

      - name: Install dependencies and restart production frontend
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          request_pty: false
          script: |
            set -e
            cd /var/www/personal-trainer/frontend/production
            pnpm install --prod --frozen-lockfile
            sudo -n /usr/bin/systemctl restart personal-trainer-frontend-production
            sleep 5
            sudo -n /usr/bin/systemctl status personal-trainer-frontend-production --no-pager
